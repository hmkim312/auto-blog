<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: linear-gradient(135deg, {{ base }} 0%, #060614 100%);
  color: #fff;
  padding: 70px 88px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  position: relative;
}
body::before {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 5px;
  background: {{ accent }};
}
.icon-block {
  width: 96px; height: 96px;
  border-radius: 24px;
  background: {{ accent }}22;
  border: 2px solid {{ accent }}88;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  margin-bottom: 28px;
}
.tag {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.32em;
  color: {{ accent }};
  text-transform: uppercase;
  margin-bottom: 14px;
}
.title {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  color: #fff;
  word-break: keep-all;
  max-width: 1000px;
}
.subtitle {
  font-size: 23px;
  font-weight: 500;
  color: {{ highlight }};
  margin-top: 22px;
  line-height: 1.45;
  max-width: 950px;
}
.attribution {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.32em;
  color: {{ highlight }};
  text-transform: uppercase;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.attribution::before {
  content: "";
  width: 28px; height: 1px;
  background: {{ accent }};
}
</style>
</head>
<body>
  {% if icon %}<div class="icon-block">{{ icon }}</div>{% endif %}
  {% if tag %}<div class="tag">{{ tag }}</div>{% endif %}
  <div class="title">{{ title }}</div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  {% if attribution %}<div class="attribution">{{ attribution }}</div>{% endif %}
</body>
</html>
