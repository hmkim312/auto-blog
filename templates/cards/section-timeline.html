<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: {{ base }};
  color: #fff;
  padding: 58px 64px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.glow {
  position: absolute;
  bottom: -100px; left: -100px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, {{ accent }}1f 0%, transparent 70%);
  pointer-events: none;
}
.header {
  margin-bottom: 36px;
  position: relative;
  z-index: 1;
}
.kicker {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.46em;
  color: {{ highlight }};
  text-transform: uppercase;
  margin-bottom: 12px;
}
.title {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.12;
  color: #fff;
  word-break: keep-all;
}
.subtitle {
  font-size: 17px;
  color: {{ highlight }};
  margin-top: 12px;
  line-height: 1.45;
  font-weight: 500;
}
.timeline {
  flex: 1;
  display: grid;
  grid-template-columns: repeat({{ steps|length }}, 1fr);
  gap: 14px;
  position: relative;
  padding-top: 16px;
  z-index: 1;
}
.timeline::before {
  content: "";
  position: absolute;
  top: 30px;
  left: 4%; right: 4%;
  border-top: 1.5px dashed {{ accent }}88;
  z-index: 0;
}
.step {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  position: relative;
  z-index: 1;
}
.marker-box {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: {{ base }};
  border: 1.5px solid {{ accent }};
  font-size: 12px;
  font-weight: 800;
  color: {{ accent }};
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  position: relative;
  z-index: 2;
}
.marker-box::before {
  content: "";
  width: 6px; height: 6px;
  background: {{ accent }};
}
.step-title {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.015em;
  line-height: 1.22;
  word-break: keep-all;
  margin-top: 4px;
}
.step-desc {
  font-size: 13px;
  color: {{ highlight }};
  line-height: 1.5;
  word-break: keep-all;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="header">
    {% if kicker %}<div class="kicker">{{ kicker }}</div>{% endif %}
    <div class="title">{{ title }}</div>
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  </div>
  <div class="timeline">
    {% for s in steps %}
    <div class="step">
      <div class="marker-box">{{ s.marker }}</div>
      <div class="step-title">{{ s.title }}</div>
      {% if s.desc %}<div class="step-desc">{{ s.desc }}</div>{% endif %}
    </div>
    {% endfor %}
  </div>
</body>
</html>
