<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: {{ accent }};
  color: {{ text_on_accent }};
  padding: 96px 90px 96px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}
body::before {
  content: "";
  position: absolute;
  left: 56px;
  top: 100px; bottom: 100px;
  width: 4px;
  background: rgba(255,255,255,0.55);
}
.icon-mark {
  font-size: 26px;
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
}
.tag {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.46em;
  color: rgba(255,255,255,0.88);
  text-transform: uppercase;
  margin-bottom: 22px;
  position: relative;
  z-index: 1;
}
.title {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -0.028em;
  line-height: 1.1;
  color: {{ text_on_accent }};
  word-break: keep-all;
  max-width: 980px;
  text-shadow: 0 2px 24px rgba(0,0,0,0.18);
  position: relative;
  z-index: 1;
}
.subtitle {
  font-size: 21px;
  font-weight: 500;
  color: rgba(255,255,255,0.92);
  margin-top: 22px;
  line-height: 1.45;
  max-width: 950px;
  word-break: keep-all;
  position: relative;
  z-index: 1;
}
.attribution {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.42em;
  color: rgba(255,255,255,0.85);
  text-transform: uppercase;
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
}
.attribution::after {
  content: "";
  width: 32px;
  height: 1.5px;
  background: rgba(255,255,255,0.85);
}
</style>
</head>
<body>
  {% if icon %}<div class="icon-mark">{{ icon }}</div>{% endif %}
  {% if tag %}<div class="tag">{{ tag }}</div>{% endif %}
  <div class="title">{{ title }}</div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  {% if attribution %}<div class="attribution">{{ attribution }}</div>{% endif %}
</body>
</html>
