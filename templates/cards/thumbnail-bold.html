<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: linear-gradient(135deg, {{ accent }} 0%, {{ base }} 100%);
  color: #fff;
  padding: 80px 90px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.kicker {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.36em;
  color: rgba(255,255,255,0.92);
  text-transform: uppercase;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}
.icon { font-size: 64px; line-height: 1; margin-bottom: 22px; position: relative; z-index: 1; }
.title {
  font-size: 86px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1.04;
  color: #fff;
  word-break: keep-all;
  overflow-wrap: break-word;
  max-width: 1000px;
  text-shadow: 0 2px 30px rgba(0,0,0,0.18);
  position: relative;
  z-index: 1;
}
.subtitle {
  font-size: 26px;
  font-weight: 500;
  color: rgba(255,255,255,0.92);
  margin-top: 26px;
  line-height: 1.4;
  max-width: 900px;
  position: relative;
  z-index: 1;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 42px;
  position: relative;
  z-index: 1;
}
.chip {
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.32);
  color: #fff;
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
  backdrop-filter: blur(4px);
}
</style>
</head>
<body>
  {% if kicker %}<div class="kicker">{{ kicker }}</div>{% endif %}
  {% if icon %}<div class="icon">{{ icon }}</div>{% endif %}
  <div class="title">{{ title }}</div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  {% if badges %}
  <div class="badges">
    {% for b in badges %}<div class="chip">{{ b }}</div>{% endfor %}
  </div>
  {% endif %}
</body>
</html>
