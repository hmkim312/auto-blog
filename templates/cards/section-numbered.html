<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: linear-gradient(155deg, {{ base }} 0%, #050510 100%);
  color: #fff;
  padding: 56px 68px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  padding-bottom: 18px;
}
.kicker {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: {{ highlight }};
  margin-bottom: 10px;
}
.title {
  font-size: 40px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.025em;
  line-height: 1.1;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.count {
  font-size: 18px;
  color: {{ highlight }};
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.items {
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
}
.item {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 28px;
  align-items: start;
  padding: 14px 0;
  border-bottom: 1px solid {{ accent }}30;
}
.item:last-child { border-bottom: none; }
.num {
  font-size: 52px;
  font-weight: 900;
  color: {{ accent }};
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.item-title {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
}
.item-desc {
  font-size: 17px;
  color: #cbd5e1;
  margin-top: 4px;
  line-height: 1.45;
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="header">
    <div>
      {% if kicker %}<div class="kicker">{{ kicker }}</div>{% endif %}
      <div class="title">{{ title }}</div>
    </div>
    {% if items %}<div class="count">{{ items|length }} POINTS</div>{% endif %}
  </div>
  <div class="items">
    {% for it in items %}
    <div class="item">
      <div class="num">{{ "%02d"|format(loop.index) }}</div>
      <div>
        <div class="item-title">{{ it.title }}</div>
        {% if it.desc %}<div class="item-desc">{{ it.desc }}</div>{% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
