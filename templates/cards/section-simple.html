<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: linear-gradient(165deg, {{ base }} 0%, #050510 100%);
  color: #fff;
  padding: 72px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}
.quote-mark {
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 200px;
  font-weight: 700;
  line-height: 0.6;
  color: {{ accent }};
  height: 90px;
  margin-left: -8px;
  margin-bottom: -8px;
  user-select: none;
}
.title {
  font-size: 54px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.03em;
  line-height: 1.15;
  max-width: 1000px;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.subtitle {
  font-size: 24px;
  color: {{ highlight }};
  font-weight: 500;
  max-width: 960px;
  margin-top: 12px;
  line-height: 1.4;
}
.attribution {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 26px;
}
.attribution-bar {
  width: 40px; height: 2px;
  background: {{ accent }};
}
.attribution-text {
  font-size: 14px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: {{ highlight }};
  font-weight: 700;
}
.badges-row {
  display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;
}
.badge {
  border: 1px solid {{ accent }}88;
  color: #fff;
  padding: 7px 16px;
  border-radius: 3px;
  font-size: 15px;
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="quote-mark">&ldquo;</div>
  <div class="title">{{ title }}</div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  {% if attribution %}
  <div class="attribution">
    <div class="attribution-bar"></div>
    <div class="attribution-text">{{ attribution }}</div>
  </div>
  {% endif %}
  {% if badges %}
  <div class="badges-row">
    {% for b in badges %}<span class="badge">{{ b }}</span>{% endfor %}
  </div>
  {% endif %}
</body>
</html>
