<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: linear-gradient(150deg, {{ base }} 0%, #060614 100%);
  color: #fff;
  padding: 52px 68px;
  display: flex;
  flex-direction: column;
  position: relative;
}
body::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: {{ accent }};
}
.header { margin-bottom: 32px; }
.kicker {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.32em;
  color: {{ highlight }};
  text-transform: uppercase;
  margin-bottom: 12px;
}
.title {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.12;
  color: #fff;
  word-break: keep-all;
}
.subtitle {
  font-size: 18px;
  color: {{ highlight }};
  margin-top: 10px;
  line-height: 1.45;
  max-width: 950px;
}
.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 18px;
}
.cell {
  background: {{ accent }}11;
  border: 1px solid {{ accent }}44;
  border-radius: 14px;
  padding: 22px 26px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.value {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  color: {{ accent }};
}
.label {
  font-size: 16px;
  color: {{ highlight }};
  margin-top: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
  word-break: keep-all;
}
.delta {
  font-size: 13px;
  color: #fff;
  margin-top: 6px;
  opacity: 0.7;
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="header">
    {% if kicker %}<div class="kicker">{{ kicker }}</div>{% endif %}
    <div class="title">{{ title }}</div>
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  </div>
  <div class="grid">
    {% for s in stats %}
    <div class="cell">
      <div class="value">{{ s.value }}</div>
      <div class="label">{{ s.label }}</div>
      {% if s.delta %}<div class="delta">{{ s.delta }}</div>{% endif %}
    </div>
    {% endfor %}
  </div>
</body>
</html>
