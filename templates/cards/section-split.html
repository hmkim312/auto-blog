<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: linear-gradient(160deg, {{ base }} 0%, #050510 100%);
  color: #fff;
  padding: 60px 72px;
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 48px;
  align-items: center;
}
.divider {
  width: 1px;
  height: 60%;
  background: {{ accent }}55;
  justify-self: center;
}
.stat-label {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: {{ highlight }};
  margin-bottom: 14px;
}
.stat-value {
  font-size: 120px;
  font-weight: 900;
  letter-spacing: -0.05em;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-unit {
  font-size: 22px;
  color: {{ highlight }};
  margin-top: 8px;
  font-weight: 500;
}
.right-title {
  font-size: 34px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 18px;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.points {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.point {
  display: grid;
  grid-template-columns: 8px 1fr;
  gap: 14px;
  align-items: start;
}
.point-dot {
  width: 8px; height: 8px;
  background: {{ accent }};
  border-radius: 50%;
  margin-top: 10px;
}
.point-text {
  font-size: 19px;
  color: #e5e7eb;
  line-height: 1.5;
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="left">
    {% if stat_label %}<div class="stat-label">{{ stat_label }}</div>{% endif %}
    <div class="stat-value">{{ stat_value }}</div>
    {% if stat_unit %}<div class="stat-unit">{{ stat_unit }}</div>{% endif %}
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="right-title">{{ title }}</div>
    <div class="points">
      {% for p in points %}
      <div class="point">
        <div class="point-dot"></div>
        <div class="point-text">{{ p }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
