<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: {{ base }};
  color: #fff;
  padding: 96px 90px 96px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}
body::before {
  content: "";
  position: absolute;
  left: 56px;
  top: 100px; bottom: 100px;
  width: 4px;
  background: {{ accent }};
}
.glow {
  position: absolute;
  top: -120px; right: -120px;
  width: 380px; height: 380px;
  background: radial-gradient(circle, {{ accent }}1c 0%, transparent 70%);
}
.icon-mark {
  font-size: 22px;
  margin-bottom: 14px;
  opacity: 0.95;
}
.tag {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.46em;
  color: {{ accent }};
  text-transform: uppercase;
  margin-bottom: 22px;
}
.title {
  font-size: 50px;
  font-weight: 800;
  letter-spacing: -0.028em;
  line-height: 1.1;
  color: #fff;
  word-break: keep-all;
  max-width: 980px;
}
.subtitle {
  font-size: 20px;
  font-weight: 500;
  color: {{ highlight }};
  margin-top: 22px;
  line-height: 1.45;
  max-width: 950px;
  word-break: keep-all;
}
.attribution {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.42em;
  color: {{ highlight }};
  text-transform: uppercase;
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.attribution::after {
  content: "";
  width: 32px;
  height: 1px;
  background: {{ accent }};
}
</style>
</head>
<body>
  <div class="glow"></div>
  {% if icon %}<div class="icon-mark">{{ icon }}</div>{% endif %}
  {% if tag %}<div class="tag">{{ tag }}</div>{% endif %}
  <div class="title">{{ title }}</div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  {% if attribution %}<div class="attribution">{{ attribution }}</div>{% endif %}
</body>
</html>
