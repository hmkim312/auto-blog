<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: {{ highlight }};
  color: {{ base }};
  padding: 70px 96px 64px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 6px;
  background: {{ accent }};
}
.quote-mark {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 200px;
  line-height: 0.6;
  color: {{ accent }};
  margin-bottom: 6px;
  height: 80px;
}
.title {
  font-size: 64px;
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.14;
  color: {{ base }};
  word-break: keep-all;
  overflow-wrap: break-word;
  max-width: 1000px;
}
.subtitle {
  font-size: 23px;
  font-weight: 500;
  color: {{ base }};
  opacity: 0.7;
  margin-top: 22px;
  line-height: 1.42;
  max-width: 900px;
}
.attribution {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.32em;
  color: {{ base }};
  opacity: 0.7;
  text-transform: uppercase;
  margin-top: 38px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.attribution::before {
  content: "";
  display: inline-block;
  width: 32px;
  height: 2px;
  background: {{ accent }};
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 26px;
}
.chip {
  background: {{ accent }};
  color: #fff;
  padding: 7px 15px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 700;
}
</style>
</head>
<body>
  <div class="quote-mark">"</div>
  <div class="title">{{ title }}</div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  {% if attribution %}<div class="attribution">{{ attribution }}</div>{% endif %}
  {% if badges %}
  <div class="badges">
    {% for b in badges %}<div class="chip">{{ b }}</div>{% endfor %}
  </div>
  {% endif %}
</body>
</html>
