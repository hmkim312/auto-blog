<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 630px;
  width: 1200px;
}
.left {
  background: linear-gradient(160deg, {{ accent }} 0%, {{ base }} 100%);
  color: #fff;
  padding: 60px 50px 60px 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.stat-label {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.85);
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
}
.stat-value {
  font-size: 130px;
  font-weight: 900;
  letter-spacing: -0.06em;
  color: #fff;
  line-height: 0.95;
  font-variant-numeric: tabular-nums;
  position: relative;
  z-index: 1;
}
.stat-unit {
  font-size: 22px;
  color: rgba(255,255,255,0.9);
  margin-top: 12px;
  font-weight: 600;
  position: relative;
  z-index: 1;
}
.right {
  background: #fafafa;
  padding: 60px 60px 60px 56px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  border-left: 1px solid #ececec;
}
.right::before {
  content: "";
  position: absolute;
  top: 50px; left: 56px;
  width: 32px; height: 3px;
  background: {{ accent }};
}
.right-title {
  font-size: 34px;
  font-weight: 800;
  color: {{ base }};
  letter-spacing: -0.022em;
  line-height: 1.2;
  margin-top: 30px;
  margin-bottom: 22px;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.points {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.point {
  display: grid;
  grid-template-columns: 8px 1fr;
  gap: 14px;
  align-items: start;
}
.point-dot {
  width: 8px; height: 8px;
  background: {{ accent }};
  border-radius: 50%;
  margin-top: 10px;
}
.point-text {
  font-size: 18px;
  color: #18181b;
  line-height: 1.5;
  font-weight: 500;
  word-break: keep-all;
}
</style>
</head>
<body>
  <div class="left">
    {% if stat_label %}<div class="stat-label">{{ stat_label }}</div>{% endif %}
    <div class="stat-value">{{ stat_value }}</div>
    {% if stat_unit %}<div class="stat-unit">{{ stat_unit }}</div>{% endif %}
  </div>
  <div class="right">
    <div class="right-title">{{ title }}</div>
    <div class="points">
      {% for p in points %}
      <div class="point">
        <div class="point-dot"></div>
        <div class="point-text">{{ p }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
