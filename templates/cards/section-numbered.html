<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px; height: 630px;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background: {{ base }};
  color: #fff;
  padding: 58px 76px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
body::before {
  content: "";
  position: absolute;
  top: -120px; right: -120px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, {{ accent }}28 0%, transparent 68%);
}
.header {
  margin-bottom: 22px;
  border-top: 1px solid {{ accent }}66;
  padding-top: 18px;
  position: relative;
  z-index: 1;
}
.kicker {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.46em;
  color: {{ highlight }};
  text-transform: uppercase;
  margin-bottom: 12px;
}
.title {
  font-size: 38px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.025em;
  line-height: 1.14;
  word-break: keep-all;
}
.items {
  display: flex;
  flex-direction: column;
  flex: 1;
  position: relative;
  z-index: 1;
}
.item {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 30px;
  align-items: center;
  padding: 18px 0;
  position: relative;
}
.item + .item::before {
  content: "";
  position: absolute;
  left: 110px; right: 0; top: 0;
  border-top: 1px dashed {{ highlight }}33;
}
.num {
  font-size: 60px;
  font-weight: 200;
  color: transparent;
  -webkit-text-stroke: 1.5px {{ accent }};
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.item-title {
  font-size: 23px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.015em;
  margin-bottom: 5px;
  word-break: keep-all;
}
.item-desc {
  font-size: 15px;
  color: #d1d5db;
  line-height: 1.5;
  font-weight: 500;
  word-break: keep-all;
}
</style>
</head>
<body>
  <div class="header">
    {% if kicker %}<div class="kicker">{{ kicker }}</div>{% endif %}
    <div class="title">{{ title }}</div>
  </div>
  <div class="items">
    {% for it in items %}
    <div class="item">
      <div class="num">{{ "%02d"|format(loop.index) }}</div>
      <div>
        <div class="item-title">{{ it.title }}</div>
        {% if it.desc %}<div class="item-desc">{{ it.desc }}</div>{% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
